- type: entity
  parent: BaseItem
  id: Boombox
  name: boombox
  description: A handheld machine capable of playing a wide variety of tunes. Enjoyment not guaranteed.
  components:
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: old-radio
    state: icon
  - type: Jukebox
    onState: on
    offState: off
    selectState: select
  - type: Item
    size: Normal
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: old-radio
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: StaticPrice
    price: 200
  - type: ActivatableUI
    key: enum.JukeboxUiKey.Key
  - type: UserInterface
    interfaces:
       enum.JukeboxUiKey.Key:
         type: JukeboxBoundUserInterface
