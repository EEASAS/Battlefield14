- type: entity
  parent: BaseSubdermalImplant
  id: TrackingImplantNATOUS
  name: United States Army tracking implant
  description: This implant has a condition monitor tuned for U.S. comms channels.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      whitelist:
        components:
        - MobState
    - type: TriggerOnMobstateChange
      mobState:
      - Critical
      - Dead
    - type: Rattle
      radioChannel: "USRadio"
      language: "English"

- type: entity
  parent: BaseSubdermalImplant
  id: TranslatorImplantEnglish
  name: English translator implant
  description: An implant giving the ability to understand and speak English.
  categories: [ HideSpawnMenu ]
  components:
  - type: TranslatorImplant
    understood:
    - English
    spoken:
    - English
    requires:
    - Sign

