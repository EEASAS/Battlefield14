## NATO
# US

- type: entity
  name: M9 Beretta
  parent: BaseWeaponPistol
  id: WeaponPistolM9  # USM9
  description: An over-engineered tent spike hammer.
  components:
  - type: Sprite
    sprite: _Battlefield14/Objects/Weapons/Guns/Pistols/M9.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    minAngle: 0
    maxAngle: 15
    angleIncrease: 2
    angleDecay: 10
    fireRate: 5
    projectileSpeed: 30
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: BF_M9Beretta_Gunshots
      params:
        volume: -3
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Battlefield14/Weapons/Guns/Beretta/rack.ogg
      params:
        volume: -1
    soundBoltOpened:
      path: /Audio/_Battlefield14/Weapons/Guns/Beretta/slidepull.ogg
      params:
        volume: -1
    soundBoltClosed:
      path: /Audio/_Battlefield14/Weapons/Guns/Beretta/sliderel.ogg
      params:
        volume: -1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolM9
        insertSound: /Audio/_Battlefield14/Weapons/Guns/Beretta/magin.ogg
        ejectSound: /Audio/_Battlefield14/Weapons/Guns/Beretta/magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolM9
      gun_chamber:
        name: Chamber
        startingItem: BF_CartridgePistol9x19
        priority: 1
        whitelist:
          tags:
            - BF_CartridgePistol9x19
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

