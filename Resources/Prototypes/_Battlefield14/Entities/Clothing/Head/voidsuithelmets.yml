
- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetVoidsuitAmericanCombatMarine
  categories: [ HideSpawnMenu ]
  name: Marine combat voidsuit helmet
  description: A combat voidsuit helmet with an external camera system instead of a traditional visor.
  components:
  - type: BreathMask
  - type: Sprite
    sprite: _Battlefield14/Clothing/Head/Voidsuithelmets/americancombatmarine.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Head/Voidsuithelmets/americancombatmarine.rsi
  - type: PointLight
    radius: 6
    color: "#ffffed"
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: IdentityBlocker
  - type: ShowJobIcons
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.9
        Radiation: 0.9
        Caustic: 0.9
      flatReductions:
        Blunt: 2
        Slash: 2
        Piercing: 2
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: ExtendDescription
    descriptionList:
      - description: Allows you to see job icons.
        color: "#4f94ad"
        requireDetailRange: true

- type: entity
  parent: ClothingHeadHelmetVoidsuitAmericanCombatMarine
  id: ClothingHeadHelmetVoidsuitRussianCombat
  categories: [ HideSpawnMenu ]
  name: Russian combat voidsuit helmet
  description: A combat voidsuit helmet with internal pressurization systems and an inbuilt tracker system for ballistics.
  components:
  - type: BreathMask
  - type: Sprite
    sprite: _Battlefield14/Clothing/Head/Voidsuithelmets/russiancombat.rsi
  - type: Clothing
    sprite: _Battlefield14/Clothing/Head/Voidsuithelmets/russiancombat.rsi
