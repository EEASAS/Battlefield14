# NATO

- type: entity
  parent: BoxMagazine
  id: BoxIFFNATOBlue
  name: box of blue IFF identifiers
  description: A box full of blue IFF identifiers, for us by NATO.
  components:
  - type: Storage
    grid:
    - 0,0,3,3
  - type: StorageFill
    contents:
      - id: ClothingNeckIFFBlue
        amount: 4
      - id: ClothingNeckIFFtapeBlue
        amount: 4
  - type: Sprite
    layers:
      - state: box_security

- type: entity
