- type: constructionGraph
  id: MortarNATOUS81mmM252
  start: start
  graph:
    - node: start
      edges:
        - to: MortarM252Deployed
          completed:
            - !type:AdminLog # Needs a log for start of attempt in addition to the completion log
              message: "An M252 mortar was assembled"
            - !type:SpawnPrototype
              prototype: MortarNATOUS81mmM252
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Digging
              doAfter: 4

    - node: MortarM252Assembly
      entity: MortarNATOUS81mmM252Assembly
      edges:
        - to: start
          completed:
            - !type:AdminLog # Needs a log for start of attempt in addition to the completion log
              message: "An M252 mortar was assembled"
            - !type:SpawnPrototype
              prototype: MortarNATOUS81mmM252
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Digging
              doAfter: 4


    - node: MortarM252Deployed
      entity: MortarNATOUS81mmM252
      edges:
        - to: start
          completed:
            - !type:AdminLog # Needs a log for start of attempt in addition to the completion log
              message: "An M252 mortar was disassembled"
            - !type:SpawnPrototype
              prototype: MortarNATOUS81mmM252Assembly
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Digging
              doAfter: 4


